---
- name: Initialize K3s Cluster
  hosts: k3s_cluster
  become: true
  gather_facts: true
  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == 'Debian'

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
          - jq
          - bash-completion
        state: present
      when: ansible_os_family == 'Debian'

- name: Configure kubectl access
  hosts: k3s_servers
  roles:
    - k3s_server
  become: true
  tasks:
    - name: Wait for K3s to be ready
      ansible.builtin.wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        timeout: 300

    - name: Create kubectl config directory
      ansible.builtin.file:
        path: /home/{{ ansible_user }}/.kube
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy kubeconfig to user directory
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/{{ ansible_user }}/.kube/config
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
        remote_src: true

    - name: Update kubeconfig server URL
      ansible.builtin.replace:
        path: /home/{{ ansible_user }}/.kube/config
        regexp: 'server: https://127.0.0.1:6443'
        replace: 'server: https://{{ ansible_host }}:6443'

- name: Verify cluster
  hosts: k3s_servers
  become: false
  tasks:
    - name: Wait for all nodes to be ready
      ansible.builtin.command: kubectl get nodes --kubeconfig=/home/{{ ansible_user }}/.kube/config
      register: nodes_status
      until: nodes_status.stdout_lines | length == 3
      retries: 30
      delay: 10
      changed_when: false

    - name: Display cluster status
      ansible.builtin.command: kubectl cluster-info --kubeconfig=/home/{{ ansible_user }}/.kube/config
      register: cluster_info
      changed_when: false

    - name: Display nodes status
      ansible.builtin.command: kubectl get nodes -o wide --kubeconfig=/home/{{ ansible_user }}/.kube/config
      register: nodes_info
      changed_when: false

    - name: Show cluster information
      ansible.builtin.debug:
        msg: |
          Cluster Information:
          {{ cluster_info.stdout }}

          Nodes Status:
          {{ nodes_info.stdout }}