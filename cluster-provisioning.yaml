---
- name: Install required Helm charts on local Kubernetes cluster
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - kubernetes.core

  vars:
    helm_namespace_prometheus: monitoring
    helm_namespace_loki: logging
    helm_namespace_tempo: tracing
    helm_namespace_argocd: argocd
    helm_namespace_traefik: traefik

  tasks:
    - name: Install helm-diff plugin
      helm_plugin:
        plugin_path: "https://github.com/databus23/helm-diff"
        state: present
  
    - name: Ensure Helm repos are added
      helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
      loop:
        - { name: prometheus-community, url: https://prometheus-community.github.io/helm-charts }
        - { name: grafana, url: https://grafana.github.io/helm-charts }
        - { name: argo, url: https://argoproj.github.io/argo-helm }

    - name: Update Helm repo cache
      ansible.builtin.command: helm repo update

    - name: Create namespaces for observability stack
      k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ item }}"
      loop:
        - "{{ helm_namespace_prometheus }}"
        - "{{ helm_namespace_loki }}"
        - "{{ helm_namespace_tempo }}"
        - "{{ helm_namespace_argocd }}"

    - name: Install kube-prometheus-stack
      helm:
        name: kube-prometheus-stack
        chart_ref: prometheus-community/kube-prometheus-stack
        release_namespace: "{{ helm_namespace_prometheus }}"
        create_namespace: false
        values:
          grafana:
            ingress:
              enabled: true
              hosts:
                - "grafana.jagat.local"

    - name: Install Loki
      helm:
        name: loki
        chart_ref: grafana/loki
        release_namespace: "{{ helm_namespace_loki }}"
        create_namespace: false
        values:
          minio:
            enabled: true
          loki:
            schemaConfig:
              configs:
                - from: 2026-04-14
                  object_store: s3
                  store: tsdb
                  schema: v13
                  index:
                    prefix: index_
                    period: 24h
            storage:
              bucketNames:
                chunks: chunks

    - name: Install Grafana Tempo
      helm:
        name: tempo
        chart_ref: grafana/tempo
        release_namespace: "{{ helm_namespace_tempo }}"
        create_namespace: false

    - name: Install Argo CD
      helm:
        name: argocd
        chart_ref: argo/argo-cd
        release_namespace: "{{ helm_namespace_argocd }}"
        create_namespace: false
        values:
          server:
            service:
              type: ClusterIP
