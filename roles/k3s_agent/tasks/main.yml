---
- name: Check if K3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Install K3s agent
  block:
    - name: Wait for server to be ready
      ansible.builtin.wait_for:
        host: "{{ groups['k3s_servers'][0] }}"
        port: 6443
        timeout: 300
      delegate_to: localhost
      when: inventory_hostname != groups['k3s_servers'][0]

    - name: Download K3s install script
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: '0755'

    - name: Get node token from server
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: server_token
      delegate_to: "{{ groups['k3s_servers'][0] }}"
      when: inventory_hostname != groups['k3s_servers'][0]

    - name: Set fact for server token
      ansible.builtin.set_fact:
        k3s_server_token: "{{ server_token.content | b64decode | trim }}"
      when: inventory_hostname != groups['k3s_servers'][0]

    - name: Install K3s agent
      ansible.builtin.command: >
        /tmp/k3s-install.sh
        INSTALL_K3S_CHANNEL={{ k3s_channel }}
        INSTALL_K3S_VERSION={{ k3s_version }}
        K3S_URL=https://{{ hostvars[groups['k3s_servers'][0]]['ansible_host'] }}:6443
        K3S_TOKEN={{ k3s_server_token | default(k3s_token) }}
        {{ k3s_agent_options | join(' ') }}
      args:
        creates: /usr/local/bin/k3s
      environment:
        INSTALL_K3S_SKIP_START: "true"
      register: k3s_install
      changed_when: k3s_install.rc == 0

    - name: Enable and start K3s service
      ansible.builtin.systemd:
        name: k3s-agent
        enabled: true
        state: started
        daemon_reload: true

    - name: Display agent information
      ansible.builtin.debug:
        msg: |
          K3s agent installed on {{ inventory_hostname }}
          Connected to server: https://{{ hostvars[groups['k3s_servers'][0]]['ansible_host'] }}:6443

  when: not k3s_binary.stat.exists
  tags: k3s_agent