---
all:
  vars:
    ansible_distribution: 'Ubuntu'
    kubernetes_cidr: "10.244.0.0/16"
    calico_version: "3.32.0"
    helm_version: "3.21.2" # Update to a stable, available version
    helm_arch: "amd64"
  children:
    kube_nodes:
      children:
        servers:
          # vars:
          #   k3s_control_node: true
          #   k3s_server_options:
          #     - "--cluster-init"
          #     - "--tls-san={{ ansible_host }}"
          #     - "--node-ip={{ ansible_host }}"
          #     # - "--node-label=svccontroller.k3s.cattle.io/enablelb=true"
          #     # - "--advertise-address={{ ansible_host }}"
          hosts:
            server1:
              ansible_user: vagrant
              ansible_ssh_private_key_file: ~/.ssh/id_ed25519
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
              ansible_python_interpreter: /usr/bin/python3
              ansible_host: 192.168.1.12
              k3s_node_name: server1
        workers:
          # vars:
          #   k3s_control_node: false
          #   k3s_agent_options:
          #     - "--node-ip={{ ansible_host }}"
          #     # - "--node-label=svccontroller.k3s.cattle.io/enablelb=true"
          #     - "--server=https://192.168.54.11:6443"
          hosts:
            worker1:
              ansible_user: vagrant
              ansible_ssh_private_key_file: ~/.ssh/id_ed25519
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
              ansible_python_interpreter: /usr/bin/python3
              ansible_host: 192.168.1.13
              k3s_node_name: worker1
            worker2:
              ansible_user: vagrant
              ansible_ssh_private_key_file: ~/.ssh/id_ed25519
              ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
              ansible_python_interpreter: /usr/bin/python3
              ansible_host: 192.168.1.14
              k3s_node_name: worker2
