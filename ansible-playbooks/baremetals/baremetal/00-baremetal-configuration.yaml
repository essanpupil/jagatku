---
- name: Install KVM and Libvirt on Ubuntu
  hosts: baremetals
  become: True
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
    - name: Install core packages
      apt:
        name:
          - apt-transport-https
          - wget
          - gnupg
          - ansible-lint
        state: present
        update_cache: yes
      
    - name: Download Grafana GPG key
      get_url:
        url: https://packages.grafana.com/gpg.key
        dest: /etc/apt/keyrings/grafana.key
        mode: "0644"
    - name: De-armor Grafana GPG key
      command: gpg --dearmor --yes -o /etc/apt/keyrings/grafana.gpg /etc/apt/keyrings/grafana.key
      args:
        creates: /etc/apt/keyrings/grafana.gpg
    - name: Add Grafana repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://packages.grafana.com/oss/deb stable main"
        state: present
        filename: grafana
      
    - name: Download Hashicorp vault GPG key
      get_url:
        url: https://apt.releases.hashicorp.com/gpg
        dest: /etc/apt/keyrings/hashicorp.key
        mode: "0644"
    - name: De-armor Hashicorp GPG key
      command: gpg --dearmor --yes -o /etc/apt/keyrings/hashicorp.gpg /etc/apt/keyrings/hashicorp.key
      args:
        creates: /etc/apt/keyrings/hashicorp.gpg
    - name: Add Hashicorp repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com trixie main"
        state: present
        filename: hashicorp
    - name: Install terraform
      apt:
        name:
          - terraform
        state: present
      
    - name: Download github GPG key
      get_url:
        url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        dest: /etc/apt/keyrings/github.key
        mode: "0644"
    - name: De-armor github GPG key
      command: gpg --dearmor --yes -o /usr/share/keyrings/githubcli-archive-keyring.gpg /etc/apt/keyrings/github.key
      args:
        creates: /etc/apt/keyrings/github.gpg
    - name: Add github repository
      apt_repository:
        repo: "deb amd64 [signed-by=/etc/apt/keyrings/github.gpg] https://cli.github.com/packages stable main"
        state: present
        filename: github
    - name: Install gh cli
      apt:
        name:
          - gh
        state: present
