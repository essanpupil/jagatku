---
- name: Deploy Virtual Machine using Libvirt
  hosts: laptop1
  become: yes
  collections:
    - community.libvirt

  vars:
    vm_name: "controller"
    vm_memory_mb: 2048          # Memory in MB (will be converted to KiB)
    vm_vcpus: 2                 # Number of vCPUs
    disk_size_gb: 20            # Disk size in GB
    vm_image_path: "/var/lib/libvirt/images/{{ vm_name }}.qcow2"
    network_name: "virbr0"      # Default libvirt NAT network
    storage_pool: "default"     # Libvirt default pool

  tasks:
    # ---------------------------------------------------------
    # Task 1: Ensure libvirt storage pool exists and is active
    # ---------------------------------------------------------
    - name: Check if default storage pool exists
      community.libvirt.virt_pool:
        name: "{{ storage_pool }}"
        state: present
      ignore_errors: yes
      register: pool_check_result

    - name: Start libvirt default storage pool if not running
      community.libvirt.virt_pool:
        name: "{{ storage_pool }}"
        state: running
      when: pool_check_result.changed or pool_check_result.failed
    # ---------------------------------------------------------
    # Task 2: Create or verify NAT network
    # ---------------------------------------------------------
    - name: Check if libvirt NAT network exists
      community.libvirt.virt_net:
        command: info
        name: "{{ network_name }}"
      register: network_check_result
      ignore_errors: yes

    - name: Create libvirt NAT network definition
      community.libvirt.virt_net:
        command: define
        xml: "{{ network_name }}定义.xml"
      when: network_check_result.failed

    # ---------------------------------------------------------
    # Task 3: Create disk image (QCOW2 format)
    # ---------------------------------------------------------
    - name: Ensure libvirt images directory exists
      ansible.builtin.file:
        path: /var/lib/libvirt/images
        state: directory
        mode: '0755'

    - name: Create QCOW2 disk image
      community.libvirt.virt_volume:
        pool: "{{ storage_pool }}"
        xml: |
          <volume>
            <name>{{ vm_name }}.qcow2</name>
            <target>/var/lib/libvirt/images/{{ vm_name }}.qcow2</target>
            <capacity unit='GiB'>{{ disk_size_gb }}</capacity>
            <allocation unit='GiB'>{{ disk_size_gb }}</allocation>
            <format type='qcow2' backingStore=''/>
          </volume>
        state: present
    # ---------------------------------------------------------
    # Task 4: Define and start the VM domain
    # ---------------------------------------------------------
    - name: Deploy virtual machine {{ vm_name }}
      community.libvirt.virt:
        name: "{{ vm_name }}"
        xml: |
          <domain type='kvm'>
            <name>{{ vm_name }}</name>
            <memory unit='KiB'>{{ (vm_memory_mb * 1024) }}</memory>
            <vcpu placement='static'>{{ vm_vcpus }}</vcpu>
            <os>
              <type arch='x86_64' machine='pc'>hvm</type>
              <boot dev='hd'/>
            </os>
            <devices>
              <disk type='file' device='disk'>
                <driver name='qemu' type='qcow2'/>
                <source file='{{ vm_image_path }}'/>
                <target dev='vda' bus='virtio'/>
              </disk>
              <interface type='network'>
                <source network='{{ network_name }}'/>
                <model type='virtio'/>
              </interface>
              <console type='pty'>
                <target type='serial' port='0'/>
              </console>
            </devices>
            <cpu mode='host-passthrough'>
              <feature policy='disable'/>
            </cpu>
          </domain>
        state: running
    # ---------------------------------------------------------
    # Task 5: Verify VM is running
    # ---------------------------------------------------------
    - name: Verify virtual machine status
      community.libvirt.virt:
        command: nodeinfo
        name: "{{ vm_name }}"
      register: vm_status

    - name: Display VM status information
      ansible.builtin.debug:
        msg: |
          Virtual Machine "{{ vm_name }}" Status: {{ vm_status.state }}
          Uptime: {{ vm_status.uptime }} seconds
          Memory: {{ vm_status.memory.current }} / {{ vm_status.memory.max }} KiB
          CPU(s): {{ vm_status.cpus.vcpus }}

    # ---------------------------------------------------------
    # Task 6: Get VM IP address (if available)
    # ---------------------------------------------------------
    - name: Retrieve VM network interfaces information
      community.libvirt.virt:
        command: nodeinfo
        name: "{{ vm_name }}"
        interface_index: 0
      register: vm_ip_info

    - name: Display VM IP address
      ansible.builtin.debug:
        msg: "Virtual Machine {{ vm_name }} IP Address: {{ vm_ip_info.ip_address }}"

