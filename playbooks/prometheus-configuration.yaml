---
- name: Install and configure prometheus in laptop
  hosts: baremetals
  become: True
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
    - name: Install Prometheus
      apt:
        name:
          - prometheus
          - prometheus-node-exporter
        state: present
    - name: Start Prometheus service
      service:
        name: prometheus
        state: started
        enabled: yes
