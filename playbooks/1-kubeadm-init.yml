---
- name: Install kubeadm
  hosts: kube_nodes
  become: true
  # vars:
    # Removed redundant and recursive ansible_user definition here
  tasks:
    - name: Install necessary system utilities (curl, etc.)
      apt:
        pkg:
          - curl
          - unzip # Added unzip to ensure file extraction works
          - gnupg
        state: present
        update_cache: true

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: true

    - name: Download kubeadm gpg key
      get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.36/deb/Release.key
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        mode: "0644"
        force: true

    - name: De-armor Docker GPG key for APT
      command: gpg --dearmor --yes --output /etc/apt/keyrings/docker.gpg /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: De-armor kubeadm gpg key for APT
      command: gpg --dearmor --yes --output /etc/apt/keyrings/kubernetes-apt-keyring.gpg /etc/apt/keyrings/kubernetes-apt-keyring.asc
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    - name: Add Docker repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu noble stable"
        state: present
        filename: docker

    - name: Add kubeadm repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.36/deb/ /"
        state: present
        filename: kubernetes
    - name: Install Docker Engine
      apt:
        pkg:
          - docker-ce
          - containerd.io
        state: latest
        update_cache: true

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Enable cri plugin
      lineinfile:
        path: /etc/containerd/config.toml
        regexp: '^[\s]*disabled_plugins'
        backup: yes
        backrefs: yes
        line: 'disabled_plugins = []'
        firstmatch: yes
        state: present
      ignore_errors: yes

    - name: Restart containerd service
      service:
        name: containerd
        state: restarted
        enabled: yes

    - name: Disable swap
      command: swapoff -a

    - name: Disable swap permanently
      lineinfile:
        path: /etc/fstab
        regexp: '^([^#].*?\\sswap\\s+.*)$'
        line: '# \\1'
        backrefs: yes

    - name: Install kubeadm package
      apt:
        pkg:
          - kubeadm
          - kubelet
          - kubectl
        state: present
        update_cache: yes

    - name: Hold kubeadm package to prevent updates
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubeadm
        - kubelet
        - kubectl

    - name: Check if kubeadm is already initialized
      ansible.builtin.stat:
        path: "/etc/kubernetes/admin.conf"
      register: kubeadm_config

    - name: Enable and start kubelet service
      ansible.builtin.systemd_service:
        name: kubelet
        enabled: true
        state: started

    - name: Reset kubeadm when kubelet run but kubeadm is not running
      command: kubeadm reset --force
      when: not kubeadm_config.stat.exists

    - name: Initiate kubeadm
      command: "kubeadm init --apiserver-advertise-address={{ ansible_host }} --pod-network-cidr={{ kubernetes_cidr }}"
      when: not kubeadm_config.stat.exists and inventory_hostname == "server1"
    
    - name: Generate join command string
      command: kubeadm token create --print-join-command
      register: join_command
      when: inventory_hostname == "server1"
    
    - name: Debug jon command variable
      ansible.builtin.debug:
        var: join_command
    
    - name: Join kubeadm
      ansible.builtin.command: "{{ hostvars['server1']['join_command'].stdout }}"
      when: inventory_hostname != "server1"

    - name: Create .kube directory for user
      file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0700"

    - name: Copy kubeconfig to user directory
      when: inventory_hostname == "server1"
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: yes
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"

    - name: Fetch kubeconfig file to local control machine
      fetch:
        src: /home/{{ ansible_user }}/.kube/config
        dest: "~/.kube/config"
        flat: yes
    # - name: Install python3 kubernetes
    #   apt:
    #     name: python3-kubernetes
    #     state: present
    #     update_cache: true

    - name: Download Helm binary archive
      ansible.builtin.get_url:
        url: "https://get.helm.sh/helm-v{{ helm_version }}-linux-{{ helm_arch }}.tar.gz"
        dest: "/tmp/helm-{{ helm_version }}.tar.gz"
        mode: '0644'

    - name: Create temporary directory for extraction
      ansible.builtin.file:
        path: "/tmp/helm-extracted"
        state: directory
        mode: '0755'

    - name: Unarchive Helm package
      ansible.builtin.unarchive:
        src: "/tmp/helm-{{ helm_version }}.tar.gz"
        dest: "/tmp/helm-extracted"
        remote_src: yes

    - name: Move Helm binary to system bin directory
      ansible.builtin.copy:
        src: "/tmp/helm-extracted/linux-{{ helm_arch }}/helm"
        dest: "/usr/local/bin/helm"
        mode: '0755'
        remote_src: yes

    - name: Clean up temporary files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/helm-{{ helm_version }}.tar.gz"
        - "/tmp/helm-extracted"

    - name: Workarround coredns empty import
      kubernetes.core.k8s:
        kubeconfig: "/home/{{ ansible_user }}/.kube/config"
        state: absent
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: coredns-custom
            namespace: kube-system
          data:
            log.override: |
              #
            stub.server: |
              #
    - name: Install helm-diff plugin
      kubernetes.core.helm_plugin:
        kubeconfig: "/home/{{ ansible_user }}/.kube/config"
        plugin_path: "https://github.com/databus23/helm-diff"
        plugin_version: 3.15.10
        state: present
