---
- name: Install and configure alloy for baremetals servers
  hosts: kube_nodes
  become: true
  vars:
    loki_url: "http://192.168.1.2:3100/loki/api/v1/push"

  tasks:
    - name: Install Grafana Alloy
      ansible.builtin.apt:
        name: alloy
        state: present
        update_cache: true

    - name: Render alloy config for validation
      check_mode: false
      ansible.builtin.template:
        src: config.alloy.j2
        dest: /tmp/alloy_config.yml
        owner: alloy
        mode: "0640"

    - name: Validate alloy config
      check_mode: false
      ansible.builtin.command:
        cmd: alloy validate /tmp/alloy_config.yml

    - name: Ensure alloy user belongs to system groups for log access
      ansible.builtin.user:
        name: alloy
        groups: "adm,systemd-journal,docker"
        append: true
      notify: Restart alloy

    - name: Deploy Alloy pipeline configuration
      ansible.builtin.copy:
        remote_src: yes
        src: /tmp/alloy_config.yml
        dest: /etc/alloy/config.alloy
        owner: alloy
        group: alloy
        mode: "0640"
        validate: alloy validate %s
      register: config_output
      notify: Restart alloy

    - name: Validate Alloy configuration
      check_mode: no
      when: config_output.changed
      command: alloy validate /etc/alloy/config.alloy

    - name: Deploy Alloy systemd service unit file
      ansible.builtin.template:
        src: alloy.service.j2
        dest: /usr/lib/systemd/system/alloy.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart alloy

    - name: Ensure Alloy service is enabled and running
      ansible.builtin.systemd:
        name: alloy
        state: started
        enabled: true
        daemon_reload: true

  handlers:
    - name: Restart alloy
      ansible.builtin.systemd:
        name: alloy
        state: restarted
        daemon_reload: true
