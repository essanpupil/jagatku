---
- name: Install kubeadm
  hosts: workers
  become: true
  tasks:
    - name: Generate join command string
      delegate_to: node1
      ansible.builtin.command: kubeadm token create --print-join-command --kubeconfig /etc/kubernetes/admin.conf
      register: join_command
      changed_when: false
      no_log: true

    # - name: Debug join command
    #   ansible.builtin.debug:
    #     var: join_command

    - name: Enable and start kubelet service
      register: kubelet_service
      ansible.builtin.systemd_service:
        name: kubelet
        enabled: true
        state: restarted

    - name: Gather information about all cluster nodes
      delegate_to: laptop1
      check_mode: false
      kubernetes.core.k8s_info:
        kubeconfig: "/home/essan/.kube/config"
        kind: Node
      register: node_list

    - name: Extract node name list
      register: node_names
      check_mode: false
      ansible.builtin.debug:
        msg: "{{ node_list.resources | map(attribute='metadata.name') | list }}"

    - name: Copy join config
      ansible.builtin.template:
        src: join-defaults.yaml.j2
        dest: /tmp/join-defaults.yaml
        mode: "0644"

    - name: Join kubeadm
      ansible.builtin.command: "kubeadm join --config /tmp/join-defaults.yaml"
      args:
        creates: /etc/kubernetes/kubelet.conf
      register: kubeadm_join_result
      when:
        - node_name not in node_names.msg

    # - name: Debug join result
    #   ansible.builtin.debug:
    #     var: kubeadm_join_result
