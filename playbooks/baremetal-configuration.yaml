---
- name: Install KVM and Libvirt on Ubuntu
  hosts: baremetals
  become: True
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install KVM and Libvirt packages
      apt:
        name:
          - qemu-system
          - libvirt-daemon-system
          - libvirt-clients
          - bridge-utils
          - curl
          - gnupg
          - software-properties-common
          - python3-lxml
        state: present
        update_cache: yes

    - name: Ensure libvirtd service is started and enabled
      systemd:
        name: libvirtd
        state: started
        enabled: yes

    - name: Verify libvirtd is running
      service:
        name: libvirtd
        state: started
    
    - name: Add user essan to libvirt group
      ansible.builtin.user:
        name: essan
        groups: libvirt
        append: yes

    - name: Write netplan configuration
      copy:
        dest: /etc/netplan/00-all-network.yaml
        content: |
          network:
            version: 2
            renderer: networkd
            ethernets:
              enp2s0:
                addresses: [192.168.1.14/24]
                routes:
                  - to: default
                    via: 192.168.1.1
                nameservers:
                  addresses: [8.8.8.8, 8.8.4.4]
                dhcp4: false
        owner: root
        group: root
        mode: '0600'

    - name: Apply netplan configuration
      command: netplan apply
      check_mode: no
