name: Check terraform config
on:
  pull_request:
    branches:
      - main
    paths:
      - 'terraform-configs/**'
permissions:
  pull-requests: write

jobs:
  list-terraform-changes:
    runs-on: laptop1
    defaults:
      run:
        shell: bash -eo pipefail {0}
    outputs:
      terraform_changes: ${{ steps.set-list.outputs.string_array }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v47.0.6
      - name: List all changed files
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          for file in ${ALL_CHANGED_FILES}; do
            echo "$file" >> terraform.txt
          done
      - name: Set playbooks as list
        id: set-list
        run: |
          JSON_ARRAY=$(jq -R -s -c 'split("\n") | map(select(length > 0 and startswith("terraform-configs"))) | map(split("/")[:-1] | join("/")) | unique' terraform.txt)
          # Save the array to step outputs
          echo "string_array=$JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "$JSON_ARRAY"

  terraform_check_plan:
    needs: list-terraform-changes
    runs-on: laptop1
    env:
      TERRAFORM_VAULT_USERNAME: ${{ secrets.VAULT_USERNAME }}
      TERRAFORM_VAULT_PASSWORD: ${{ secrets.VAULT_PASSWORD }}
    defaults:
      run:
        shell: bash -eo pipefail {0}
    strategy:
      matrix:
        terraforms: ${{ fromJson(needs.list-terraform-changes.outputs.terraform_changes) }}
    steps:
      - name: Terraform init
        working-directory: ./${{ matrix.terraforms }}
        env:
            GITHUB_TOKEN: ${{ github.token }}
        run: terraform init
      - name: Terraform plan
        id: tfplan
        working-directory: ./${{ matrix.terraforms }}
        env:
            TF_VAR_token: ${{ github.token }}
            TF_CLI_ARGS: "-no-color"
        run: terraform plan | tee plan.txt
        continue-on-error: true
      - name: Prepend playbook path for identification
        working-directory: ./${{ matrix.terraforms }}
        run: echo "${{ matrix.terraforms }}" >> terraform_plan.md
      - name: Prepare PR comment format
        working-directory: ./${{ matrix.terraforms }}
        run: |
          ls
          echo "\`\`\`diff" >> terraform_plan.md
          cat plan.txt >> terraform_plan.md
          echo "\`\`\`" >> terraform_plan.md
      - name: Append playbook path for identification
        working-directory: ./${{ matrix.terraforms }}
        run: echo "${{ matrix.terraforms }}" >> terraform_plan.md
      - name: Post comment of ansible check diff result
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: './${{ matrix.terraforms }}/terraform_plan.md'
      - name: State workflow to fail
        if: steps.tfplan.outcome == 'failure'
        run: |
          echo "Terraform plan failed"
          exit 1
