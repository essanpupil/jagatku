---
- name: Basic kubernetes provisioning
  hosts: node1
  gather_facts: true
  vars_files:
    - vault.yaml
  vars:
    namespaces:
      observability: "observability"
      argocd: "argocd"
      certmanager: "cert-manager"

  tasks:
    - name: Install helm-diff plugin
      kubernetes.core.helm_plugin:
        plugin_path: "https://github.com/databus23/helm-diff"
        state: present
  
    - name: Ensure Helm repos are added
      kubernetes.core.helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
      loop:
        - { name: prometheus-community, url: https://prometheus-community.github.io/helm-charts }
        - { name: grafana-community, url: https://grafana-community.github.io/helm-charts/ }
        - { name: grafana, url: https://grafana.github.io/helm-charts }
        - { name: argo, url: https://argoproj.github.io/argo-helm }
        - { name: bitnami-labs, url:  https://bitnami-labs.github.io/sealed-secrets/ }

    - name: Create namespaces
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ item.value }}"
      loop: "{{ namespaces | dict2items }}"

    - name: Install cert-manager
      kubernetes.core.helm:
        name: certmanager
        chart_ref: "oci://quay.io/jetstack/charts/cert-manager"
        # chart_version: "v1.20.2"
        release_namespace: "{{ namespaces['certmanager'] }}"
        state: absent
        wait: false
        atomic: false
        values:
          crds:
            enabled: true

    - name: Ingress route for grafana
      kubernetes.core.k8s:
        state: absent
        namespace: "{{ namespaces['observability'] }}"
        definition:          
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: grafana
          spec:
            entryPoints:
              - web        # Maps to port 80 by default in K3s
            routes:
            - match: Host(`grafana.jagat.local`)
              kind: Rule
              services:
              - name: grafana
                port: 80

    - name: Create secrets for grafana
      kubernetes.core.k8s:
        namespace: "{{ namespaces['observability'] }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: grafana-credentials
          data:
            admin-user: "{{ grafana_admin_user | b64encode }}"
            admin-password: "{{ grafana_admin_password | b64encode }}"

    - name: Install Grafana helm
      kubernetes.core.helm:
        name: grafana
        state: absent
        chart_ref: grafana-community/grafana
        chart_version: 12.1.1
        namespace: "{{ namespaces['observability'] }}"
        create_namespace: false
        values:
          persistence:
            enabled: true
            size: 1Gi
          datasources:
            datasources.yaml:
              apiVersion: 1
              datasources:
                - name: Prometheus
                  type: prometheus
                  url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
                # - name: Loki
                #   type: loki
          admin:
            existingSecret: grafana-credentials
            userKey: admin-user
            passwordKey: admin-password
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - grafana.jagat.local

    - name: Install kube-prometheus-stack
      kubernetes.core.helm:
        name: kube-prometheus-stack
        chart_ref: prometheus-community/kube-prometheus-stack
        chart_version: 83.6.0
        namespace: "{{ namespaces['observability'] }}"
        create_namespace: false
        # state: absent
        values:
          prometheus:
            prometheusSpec:
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    # storageClassName: "standard" # Replace with your storage class
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 2Gi
          prometheusOperator:
            admissionWebhooks:
              failurePolicy: "Ignore"
          grafana:
            persistence:
              enabled: true
              size: 1Gi
            ingress:
              enabled: true
              IngressClassName: traefik
              hosts:
                - "grafana.jagat.local"
            admin:
              existingSecret: grafana-credentials
              userKey: admin-user
              passwordKey: admin-password
            enable: true
            service:
              enable: false

    - name: Install Loki
      kubernetes.core.helm:
        name: loki
        chart_ref: grafana/loki
        # chart_version: "6.53.0"
        namespace: "{{ namespaces['observability'] }}"
        create_namespace: false
        state: absent
        values:
          global:
            dnsService: "kube-dns"
            dnsNamespace: "kube-system"
            clusterDomain: "cluster.local"
          loki:
            commonConfig:
              replication_factor: 1
            schemaConfig:
              configs:
                - from: "2026-04-16"
                  store: tsdb
                  object_store: s3
                  schema: v13
                  index:
                    prefix: loki_index_
                    period: 24h
            pattern_ingester:
              enabled: true
            limits_config:
              allow_structured_metadata: true
              volume_enabled: true
            ruler:
              enable_api: true
          minio:
            enabled: true
          deploymentMode: SingleBinary
          singleBinary:
            replicas: 1
          # Zero out replica counts of other deployment modes
          backend:
            replicas: 0
          read:
            replicas: 0
          write:
            replicas: 0
          ingester:
            replicas: 0
          querier:
            replicas: 0
          queryFrontend:
            replicas: 0
          queryScheduler:
            replicas: 0
          distributor:
            replicas: 0
          compactor:
            replicas: 0
          indexGateway:
            replicas: 0
          bloomPlanner:
            replicas: 0
          bloomBuilder:
            replicas: 0
          bloomGateway:
            replicas: 0

    - name: Install Grafana Tempo
      kubernetes.core.helm:
        name: tempo
        chart_ref: grafana/tempo
        namespace: "{{ namespaces['observability'] }}"
        create_namespace: false

