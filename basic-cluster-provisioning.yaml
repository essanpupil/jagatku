---
- name: Basic kubernetes provisioning
  hosts: node1
  gather_facts: true
  vars_files:
    - vault.yaml
  vars:
    namespaces:
      observability: "observability"
      argocd: "argocd"
      certmanager: "cert-manager"

  tasks:
    - name: Workarround coredns empty import
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: coredns-custom
            namespace: kube-system
          data:
            log.override: |
              #
            stub.server: |
              #
    - name: Install helm-diff plugin
      kubernetes.core.helm_plugin:
        plugin_path: "https://github.com/databus23/helm-diff"
        state: present
  
    - name: Ensure Helm repos are added
      kubernetes.core.helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
      loop:
        - { name: prometheus-community, url: https://prometheus-community.github.io/helm-charts }
        - { name: grafana-community, url: https://grafana-community.github.io/helm-charts/ }
        - { name: grafana, url: https://grafana.github.io/helm-charts }
        - { name: argo, url: https://argoproj.github.io/argo-helm }
        - { name: bitnami-labs, url:  https://bitnami-labs.github.io/sealed-secrets/ }

    - name: Create namespaces
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ item.value }}"
      loop: "{{ namespaces | dict2items }}"

    - name: Install cert-manager
      kubernetes.core.helm:
        name: certmanager
        chart_ref: "oci://quay.io/jetstack/charts/cert-manager"
        # chart_version: "v1.20.2"
        release_namespace: "{{ namespaces['certmanager'] }}"
        state: absent
        wait: false
        atomic: false
        values:
          crds:
            enabled: true

    - name: Ingress route for grafana
      kubernetes.core.k8s:
        state: absent
        namespace: "{{ namespaces['observability'] }}"
        definition:          
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: grafana
          spec:
            entryPoints:
              - web        # Maps to port 80 by default in K3s
            routes:
            - match: Host(`grafana.jagat.local`)
              kind: Rule
              services:
              - name: grafana
                port: 80

    - name: Create secrets for grafana
      kubernetes.core.k8s:
        namespace: "{{ namespaces['observability'] }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: grafana-credentials
          data:
            admin-user: "{{ grafana_admin_user | b64encode }}"
            admin-password: "{{ grafana_admin_password | b64encode }}"

    - name: Install Loki
      kubernetes.core.helm:
        name: loki
        chart_ref: grafana/loki
        chart_version: "6.53.0"
        namespace: "{{ namespaces['observability'] }}"
        create_namespace: false
        # state: absent
        values:
          chunksCache:
            resources:
              limits:
                memory: 512Mi # Reduce from default
              requests:
                cpu: 100m
                memory: 512Mi
          loki:
            storage:
              chunks: chunks
              ruler: ruler
            commonConfig:
              replication_factor: 3
            schemaConfig:
              configs:
                - from: "2026-05-31"
                  store: tsdb
                  object_store: s3
                  schema: v13
                  index:
                    prefix: loki_index_
                    period: 24h
            # pattern_ingester:
            #   enabled: true
            limits_config:
            #   allow_structured_metadata: true
              volume_enabled: true
            # ruler:
            #   enable_api: true
          minio:
            enabled: true
          # deploymentMode: SingleBinary
          # singleBinary:
          #   persistence:
          #     size: 3Gi
          #   replicas: 3
          # # Zero out replica counts of other deployment modes
          # backend:
          #   replicas: 0
          # read:
          #   replicas: 0
          # write:
          #   replicas: 0
          # ingester:
          #   replicas: 0
          # querier:
          #   replicas: 0
          # queryFrontend:
          #   replicas: 0
          # queryScheduler:
          #   replicas: 0
          # distributor:
          #   replicas: 0
          # compactor:
          #   replicas: 0
          # indexGateway:
          #   replicas: 0
          # bloomPlanner:
          #   replicas: 0
          # bloomBuilder:
          #   replicas: 0
          # bloomGateway:
          #   replicas: 0

    - name: Install Grafana Tempo
      kubernetes.core.helm:
        name: tempo
        chart_ref: grafana/tempo
        namespace: "{{ namespaces['observability'] }}"
        create_namespace: false
        # state: absent
        values:
          tempo:
            metricsGenerator:
              enabled: true
              remoteWriteUrl: "http://kube-prometheus-stack-prometheus.{{ namespaces['observability'] }}.svc.cluster.local:9090/api/v1/write"
          persistence:
            enabled: true
            size: "3Gi"

    - name: Install K8S monitoring
      kubernetes.core.helm:
        name: k8s-monitoring
        chart_ref: grafana/k8s-monitoring
        chart_version: 4.1.3
        namespace: "{{ namespaces['observability'] }}"
        create_namespace: false
        # state: absent
        values:
          cluster:
            name: "default"
          destinations:
            localPrometheus:
              type: prometheus
              url: "http://kube-prometheus-stack-prometheus.{{ namespaces['observability'] }}.svc.cluster.local:9090/api/v1/write"
            localLogs:
              type: loki
              url: "http://loki-gateway.{{ namespaces['observability'] }}.svc.cluster.local/loki/api/v1/push"
              # auth:
              #   type: basic
              #   username: "my-username"
              #   password: "my-password"
              tenantId: "jagatku"
            otlpGateway:
              type: otlp
              url: https://tempo.observability.svc.cluster.local:4317/v1/traces
              # auth:
              #   type: basic
              #   username: "my-username"
              #   password: "my-password"
              # metrics: { enabled: true }
              # logs:    { enabled: true }
              # traces:  { enabled: true }
          
          # Features
          clusterMetrics:
            enabled: true  # Enables infra-level metrics (Nodes, Pods)
            collector: alloy-metrics
          clusterEvents:
            enabled: true
            collector: alloy-singleton
          podLogsViaLoki:
            enabled: true
            collector: alloy-logs
          nodeLogs:
            enabled: true
            collector: alloy-logs
          hostMetrics:
            enabled: true
            collector: alloy-metrics
            linuxHosts:
              enabled: true

          # Collectors
          collectors:
            alloy-metrics:
              presets: [medium, clustered, statefulset]
            alloy-singleton:
              enabled: true
            alloy-logs:
              enabled: true
              presets: [filesystem-log-reader, daemonset]
          telemetryServices:
            node-exporter:
              deploy: true
            kube-state-metrics:
              deploy: true

    - name: Install Argo CD
      kubernetes.core.helm:
        name: argocd
        chart_ref: argo/argo-cd
        chart_version: 9.5.17
        release_namespace: "argocd"
        create_namespace: true
        values:
          global:
            domain: argocd.jagat.local
          configs:
            params:
              server.insecure: true
          server:
            ingress:
              enabled: true
              ingressClassName: traefik

    - name: Install kube-prometheus-stack
      kubernetes.core.helm:
        name: kube-prometheus-stack
        chart_ref: prometheus-community/kube-prometheus-stack
        chart_version: 86.1.0
        namespace: "{{ namespaces['observability'] }}"
        create_namespace: false
        # update_repo_cache: true
        # state: absent
        values:
          prometheus:
            prometheusSpec:
              enableRemoteWriteReceiver: true
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    # storageClassName: "standard" # Replace with your storage class
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 2Gi
                    # volumeName: pvc-4735d14e-9c07-42eb-9a2c-851112e76b7b
          prometheusOperator:
            admissionWebhooks:
              failurePolicy: "Ignore"
          grafana:
            additionalDataSources:
              - name: Loki
                type: loki
                orgId: 1
                url: "http://loki-gateway.{{ namespaces['observability'] }}.svc.cluster.local"
                jsonData:
                  timeout: 60
                  maxLines: 1000
                  httpHeaderName1: 'X-Scope-OrgID'
                secureJsonData:
                  httpHeaderValue1: 'jagatku'
              - name: Tempo
                type: tempo
                uid: tempo
                url: "http://tempo.{{ namespaces['observability'] }}.svc.cluster.local:3200"
                jsonData:
                  # Optional: Link traces to Loki logs
                  tracesToLogsV2:
                    datasourceUid: loki
                    groupFilters: []
                  # Optional: Link traces to Prometheus metrics
                  tracesToMetrics:
                    datasourceUid: prometheus
                  serviceMap:
                    datasourceUid: prometheus
                  nodeGraph:
                    enabled: true
            persistence:
              enabled: true
              size: 1Gi
            ingress:
              enabled: true
              IngressClassName: traefik
              hosts:
                - "grafana.jagat.local"
            admin:
              existingSecret: grafana-credentials
              userKey: admin-user
              passwordKey: admin-password
            enable: true
            service:
              enable: false
